<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Seasonal Calendar – Harvestpedia</title>
<link rel="stylesheet" href="../css/style.css"/>
<style>
  :root {
  --green-50:  #f0f9f0;
  --green-100: #d4edda;
  --green-200: #a8d5b5;
  --green-300: #72bb88;
  --green-400: #5aab6f;
  --green-600: #2d7a45;
  --green-800: #1a4f2b;

  --earth-50:  #fdf6ee;

  --cream:      #fdfaf5;
  --warm-white: #fffef9;

  --text-dark:  #1c2b1e;
  --text-mid:   #3d5440;
  --text-muted: #6b8070;

  --shadow-md:  0 6px 30px rgba(30,60,35,0.10);
  --radius-lg:  32px;
}
  .cal-hero {
    padding: 2.5rem 1.5rem 2rem; text-align:center;
    background: linear-gradient(135deg, #e8f4e8 0%, #faf5e8 100%);
  }
  .cal-hero h1 { font-size:2rem; font-weight:700; color:#1a3a1a; }
  .cal-hero p  { color:#6b7280; margin-top:.4rem; }

  .cal-wrap { max-width:1000px; margin:0 auto; padding:2rem 1.5rem; }

  /* Month strip */
  .month-btn {
  border-radius: 14px;
  padding: 10px 6px;

  background: white;
  border: 1px solid var(--green-100);

  font-size: 11px;
  color: var(--text-mid);

  transition: all 0.2s;
}

.month-btn.active {
  background: var(--green-600);
  color: white;
  box-shadow: 0 4px 14px rgba(45,122,69,0.3);
}

  /* Season legend */
  .season-legend {
    display:flex; gap:16px; flex-wrap:wrap; margin-bottom:1.5rem;
    justify-content:center;
  }
  .leg-item { display:flex; align-items:center; gap:6px; font-size:12px; color:#374151; }
  .leg-dot  { width:10px; height:10px; border-radius:50%; }

  /* Filter tabs */
  .filter-tab {
  padding: 8px 18px;
  border-radius: 50px;

  border: 1px solid var(--green-100);
  background: var(--green-50);

  font-size: 13px;
  color: var(--text-mid);

  transition: all 0.2s ease;
}

.filter-tab.active {
  background: var(--green-600);
  color: white;
  border-color: var(--green-600);
}

  /* Produce grid */
  .produce-section h3 {
  font-size: 14px;
  font-weight: 700;
  color: var(--text-dark);

  margin-bottom: 10px;
}
  .produce-grid {
    display:grid; grid-template-columns:repeat(auto-fill, minmax(140px,1fr)); gap:10px;
  }
  .produce-card {
  background: white;
  border-radius: 20px;
  padding: 14px;

  border: 1px solid var(--green-100);
  box-shadow: 0 4px 20px rgba(30,60,35,0.08);

  text-align: center;
  text-decoration: none;
  color: var(--text-dark);

  transition: all 0.25s ease;
}

.produce-card:hover {
  transform: translateY(-4px) scale(1.02);
  box-shadow: 0 10px 30px rgba(30,60,35,0.15);
}

.p-name {
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 6px;
}

  /* Season badge */
  .produce-card.peak   { border-top:3px solid #3B6D11; }
  .produce-card.good   { border-top:3px solid #BA7517; }
  .produce-card.low    { border-top:3px solid #e5e7eb; }

  .peak-badge {
    display:inline-block; font-size:10px; font-weight:600; padding:1px 6px;
    border-radius:99px; margin-top:4px;
  }
  .badge-peak { background:#d1fae5; color:#065f46; }
  .badge-good { background:#fef3c7; color:#92400e; }
  .badge-low  { background:#f3f4f6; color:#6b7280; }

  /* Current month header */
  .current-header {
    display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap;
    gap:8px; margin-bottom:1.5rem;
  }
  .current-header h2 { font-size:1.4rem; font-weight:700; color:#1a3a1a; }
  .current-header span { font-size:13px; color:#6b7280; }

  /* Year overview mini heatmap */
  .heatmap-section { margin-top:2rem; }
  .heatmap-section h2 { font-size:1rem; font-weight:700; color:#1a3a1a; margin-bottom:1rem; }
  .heatmap-table { width:100%; border-collapse:collapse; font-size:11px; }
  .heatmap-table th { font-weight:600; color:#9ca3af; padding:4px 6px; text-align:center; }
  .heatmap-table td { padding:5px 3px; text-align:center; }
  .hm-cell {
    display:block; width:28px; height:22px; border-radius:4px; margin:auto;
    font-size:9px; line-height:22px; font-weight:600;
  }
  .hm-peak { background:#3B6D11; color:#fff; }
  .hm-good { background:#BA7517; color:#fff; }
  .hm-low  { background:#f3f4f6; color:#9ca3af; }
  .hm-none { background:#fff; color:#e5e7eb; }
#navbar.scrolled {
  box-shadow: 0 6px 30px rgba(30,60,35,0.08);
}

/* ── LOGO ───────────────────────────────── */
.nav-logo {
  display: flex;
  align-items: center;
  gap: 10px;

  font-family: 'Playfair Display', serif;
  font-size: 22px;
  font-weight: 700;

  color: var(--green-800);
  text-decoration: none;
}

.nav-logo-leaf {
  width: 34px;
  height: 34px;

  background: linear-gradient(135deg, var(--green-400), var(--green-600));
  border-radius: 50% 12px 50% 12px;

  display: flex;
  align-items: center;
  justify-content: center;

  font-size: 16px;

  box-shadow: 0 4px 14px rgba(45,122,69,0.3);
}

/* ── LINKS ───────────────────────────────── */
.nav-links {
  display: flex;
  align-items: center;
  gap: 6px;

  list-style: none;
}

.nav-links li {
  list-style: none;
}

.nav-links a {
  text-decoration: none;
  color: var(--text-mid);

  font-size: 14px;
  font-weight: 500;

  padding: 8px 18px;
  border-radius: 50px;

  transition: all 0.2s ease;
}

/* Hover */
.nav-links a:hover {
  background: var(--green-50);
  color: var(--green-600);
}

/* Active page */
.nav-links a.active {
  background: var(--green-50);
  color: var(--green-600);
}

/* CTA Button */
.nav-cta {
  background: var(--green-600) !important;
  color: white !important;

  box-shadow: 0 4px 14px rgba(45,122,69,0.3);
}

.nav-cta:hover {
  background: var(--green-800) !important;
  transform: translateY(-1px);
}

/* ── RESPONSIVE ───────────────────────────── */
@media (max-width: 768px) {
  #navbar {
    padding: 12px 20px;
  }

  .nav-links {
    display: none; /* later you can add hamburger */
  }
}

</style>

// ── State ─────────────────────────────────────────────────
let currentMonth = new Date().getMonth(); // 0-indexed
let activeType   = "all";

// ── Month strip ───────────────────────────────────────────
function renderMonthStrip() {
  const el = document.getElementById("months-strip");
  el.innerHTML = MONTHS.map((m, i) => `
    <button class="month-btn ${i === currentMonth ? "active" : ""}"
      onclick="selectMonth(${i})">${m}<br><small style="font-weight:400">${seasonEmoji(i)}</small></button>
  `).join("");
}

function seasonEmoji(mi) {
  const s = MONTH_SEASON[mi];
  return s === "Spring" ? "🌸" : s === "Summer" ? "☀️" : s === "Autumn" ? "🍂" : "❄️";
}

function selectMonth(i) {
  currentMonth = i;
  renderMonthStrip();
  renderProduce();
}

// ── Produce area ──────────────────────────────────────────
function renderProduce() {
  const mi = currentMonth;
  const title = document.getElementById("month-title");
  const sub   = document.getElementById("month-subtitle");
  title.textContent = MONTH_NAMES[mi];
  sub.textContent   = `${MONTH_SEASON[mi]} — best picks for this month`;

  let data = PRODUCE.filter(p => activeType === "all" || p.type === activeType);
  const peak = data.filter(p => p.season[mi] === "peak");
  const good = data.filter(p => p.season[mi] === "good");
  const low  = data.filter(p => p.season[mi] === "low");

  let html = "";
  if (peak.length) html += renderGroup("🌟 Peak Season", peak, mi);
  if (good.length) html += renderGroup("✅ Good Availability", good, mi);
  if (low.length)  html += renderGroup("⬇️ Limited", low, mi);
  if (!peak.length && !good.length && !low.length) {
    html = `<p style="color:#9ca3af;text-align:center;padding:2rem">No data for this selection.</p>`;
  }
  document.getElementById("produce-area").innerHTML = html;
}

function renderGroup(title, items, mi) {
  const cards = items.map(p => {
    const status = p.season[mi];
    const badge = status === "peak" ? '<span class="peak-badge badge-peak">Peak</span>'
                : status === "good" ? '<span class="peak-badge badge-good">Good</span>'
                : '<span class="peak-badge badge-low">Low</span>';
    return `
      <a class="produce-card ${status}" href="${p.url}">
        <span class="p-emoji">${p.emoji}</span>
        <div class="p-name">${p.name}</div>
        ${badge}
      </a>`;
  }).join("");
  return `<div class="produce-section"><h3>${title} <span style="font-weight:400">(${items.length})</span></h3><div class="produce-grid">${cards}</div></div>`;
}

// ── Heatmap ───────────────────────────────────────────────
function renderHeatmap() {
  const items = PRODUCE.filter(p => activeType === "all" || p.type === activeType).slice(0, 15);
  if (!items.length) { document.getElementById("heatmap-section").innerHTML = ""; return; }

  const header = `<tr><th style="text-align:left">Item</th>${MONTHS.map(m=>`<th>${m}</th>`).join("")}</tr>`;
  const rows = items.map(p => {
    const cells = p.season.map((s, mi) => {
      const cls = s === "peak" ? "hm-peak" : s === "good" ? "hm-good" : s === "low" ? "hm-low" : "hm-none";
      const label = s === "peak" ? "▲" : s === "good" ? "●" : s === "low" ? "▽" : "";
      return `<td><span class="hm-cell ${cls}" title="${MONTH_NAMES[mi]}: ${s||'off-season'}">${label}</span></td>`;
    }).join("");
    return `<tr><td style="font-size:12px;white-space:nowrap;padding:4px 6px">${p.emoji} ${p.name}</td>${cells}</tr>`;
  }).join("");

  document.getElementById("heatmap-section").innerHTML = `
    <h2>📅 Year-at-a-glance</h2>
    <div style="overflow-x:auto">
      <table class="heatmap-table"><thead>${header}</thead><tbody>${rows}</tbody></table>
    </div>
  `;
}

// ── Filter tabs ───────────────────────────────────────────
document.querySelectorAll(".filter-tab").forEach(tab => {
  tab.addEventListener("click", () => {
    document.querySelectorAll(".filter-tab").forEach(t => t.classList.remove("active"));
    tab.classList.add("active");
    activeType = tab.dataset.type;
    renderProduce();
    renderHeatmap();
  });
});

// ── Init ──────────────────────────────────────────────────
renderMonthStrip();
renderProduce();
renderHeatmap();
</script>
