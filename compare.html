<style>
  .compare-btn {
  margin-left: auto;
  padding: 10px 22px;
  border-radius: 50px;
  border: none;
  font-weight: 600;
  cursor: pointer;
  background: var(--green-600);
  color: white;
  box-shadow: 0 6px 24px rgba(45,122,69,0.3);
  transition: all 0.25s ease;
}

.compare-btn:hover {
  background: var(--green-800);
  transform: translateY(-2px);
}

.compare-btn:disabled {
  background: #9ca3af;
  cursor: not-allowed;
}

  /* Item picker */
  .picker-section { background:#fff; border:1px solid #e5e7eb; border-radius:14px; padding:1.5rem; margin-bottom:1.5rem; }
  .picker-section h2 { font-size:1rem; font-weight:600; color:#1a3a1a; margin-bottom:1rem; }
  .picker-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(150px,1fr)); gap:8px; }
  .pick-item {
    display:flex; align-items:center; gap:8px; padding:8px 12px;
    border:1.5px solid #e5e7eb; border-radius:10px; cursor:pointer;
    font-size:13px; font-weight:500; color:#374151; transition:all .15s;
    background:#fff;
  }
  .pick-item:hover { border-color:#3B6D11; background:#f5f9f0; }
  .pick-item.selected { border-color:#3B6D11; background:#3B6D11; color:#fff; }
  .pick-item .emoji { font-size:1.2rem; }

  /* Selected bar */
  .selected-bar {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  padding: 14px;
  border-radius: var(--radius-md);
  background: var(--green-50);
  border: 1px solid var(--green-100);
}

.sel-tag {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 14px;
  border-radius: 50px;
  background: white;
  border: 1px solid var(--green-100);
  font-size: 12px;
  color: var(--green-600);
  font-weight: 500;
}

.sel-tag button {
  border: none;
  background: none;
  cursor: pointer;
  color: #999;
}

.sel-tag button:hover {
  color: red;
}
  /* Chart area */
  .chart-section {
  background: var(--warm-white);
  border-radius: var(--radius-lg);
  padding: 1.5rem;
  box-shadow: var(--shadow-md);
  border: 1px solid var(--green-100);
}
  .chart-tabs { display:flex; gap:4px; border-bottom:1.5px solid #e5e7eb; margin-bottom:1.5rem; }
  .chart-tab {
    padding:7px 16px; border:none; background:none; cursor:pointer;
    font-size:13px; font-weight:500; color:#6b7280;
    border-bottom:2px solid transparent; margin-bottom:-1.5px; transition:all .15s;
  }
  .chart-tab.active { color:#3B6D11; border-bottom-color:#3B6D11; }
  .chart-panel { display:none; }
  .chart-panel.active { display:block; }
  .chart-wrap { position:relative; height:320px; }

  /* Comparison table */
  .comp-table { width:100%; border-collapse:collapse; font-size:13px; }
  .comp-table th, .comp-table td {
    padding:10px 14px; text-align:left; border-bottom:1px solid #f3f4f6;
  }
  .comp-table th { font-weight:600; color:#374151; background:#f9fafb; }
  .comp-table td:first-child { color:#6b7280; font-size:12px; }
  .best-val { background:#d1fae5; color:#065f46; border-radius:6px; padding:2px 8px; font-weight:600; }

  .loading-msg { text-align:center; padding:2rem; color:#6b7280; font-size:1rem; }
  .hidden { display:none; }

  /* Color palette for up to 5 items */
  :root {
  --green-50:  #f0f9f0;
  --green-100: #d4edda;
  --green-300: #72bb88;
  --green-600: #2d7a45;
  --green-800: #1a4f2b;

  --earth-50:  #fdf6ee;
  --earth-300: #d4a96a;

  --cream:      #fdfaf5;
  --warm-white: #fffef9;

  --text-dark:  #1c2b1e;
  --text-mid:   #3d5440;
  --text-muted: #6b8070;

  --shadow-sm:  0 2px 12px rgba(30,60,35,0.07);
  --shadow-md:  0 6px 30px rgba(30,60,35,0.10);

  --radius-md: 20px;
  --radius-lg: 32px;
}
  .pick-item {
  padding: 10px 14px;
  border-radius: 50px;
  border: 1px solid var(--green-100);
  background: var(--green-50);
  color: var(--text-mid);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s ease;
}

.pick-item:hover {
  border-color: var(--green-300);
  color: var(--green-600);
}

.pick-item.selected {
  background: var(--green-600);
  color: white;
  border-color: var(--green-600);
  box-shadow: 0 4px 14px rgba(45,122,69,0.3);
}
/* ── NAVBAR ───────────────────────────────── */
#navbar {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 200;

  display: flex;
  align-items: center;
  justify-content: space-between;

  padding: 14px 40px;

  background: rgba(253,250,245,0.88);
  backdrop-filter: blur(16px);

  border-bottom: 1px solid rgba(90,171,111,0.12);
  transition: all 0.3s ease;
}

/* Shadow on scroll */
#navbar.scrolled {
  box-shadow: 0 6px 30px rgba(30,60,35,0.08);
}

/* ── LOGO ───────────────────────────────── */
.nav-logo {
  display: flex;
  align-items: center;
  gap: 10px;

  font-family: 'Playfair Display', serif;
  font-size: 22px;
  font-weight: 700;

  color: var(--green-800);
  text-decoration: none;
}

.nav-logo-leaf {
  width: 34px;
  height: 34px;

  background: linear-gradient(135deg, var(--green-400), var(--green-600));
  border-radius: 50% 12px 50% 12px;

  display: flex;
  align-items: center;
  justify-content: center;

  font-size: 16px;

  box-shadow: 0 4px 14px rgba(45,122,69,0.3);
}

/* ── LINKS ───────────────────────────────── */
.nav-links {
  display: flex;
  align-items: center;
  gap: 6px;

  list-style: none;
}

.nav-links li {
  list-style: none;
}

.nav-links a {
  text-decoration: none;
  color: var(--text-mid);

  font-size: 14px;
  font-weight: 500;

  padding: 8px 18px;
  border-radius: 50px;

  transition: all 0.2s ease;
}

/* Hover */
.nav-links a:hover {
  background: var(--green-50);
  color: var(--green-600);
}

/* Active page */
.nav-links a.active {
  background: var(--green-50);
  color: var(--green-600);
}

/* CTA Button */
.nav-cta {
  background: var(--green-600) !important;
  color: white !important;

  box-shadow: 0 4px 14px rgba(45,122,69,0.3);
}

.nav-cta:hover {
  background: var(--green-800) !important;
  transform: translateY(-1px);
}

/* ── RESPONSIVE ───────────────────────────── */
@media (max-width: 768px) {
  #navbar {
    padding: 12px 20px;
  }

  .nav-links {
    display: none; /* later you can add hamburger */
  }
}

</main>

const FRUITS = [
  "Apple","Apricot","Avocado","Banana","Blueberry","Cherry","Coconut","Dragon Fruit","Durian","Fig",
  "Grape","Grapefruit","Guava","Jackfruit","Kiwi","Lemon","Lychee","Mango","Melon","Orange",
  "Papaya","Peach","Pear","Pineapple","Plum","Pomegranate","Raspberry","Starfruit","Strawberry","Watermelon",
  "Passion Fruit","Mulberry","Mandarin","Cranberry","Blackberry","Custard Apple","Sapota","Tamarind","Physalis",
  "Rambutan","Persimmon","Pomelo","Jujube","Star Gooseberry","Longan","Loquat","Kumquat","Salak",
  "Ackee","Breadfruit","Carambola","Cherimoya","Sapodilla","Santol","Mangaba","Canistel"
];
const VEGS = [
  "Potato","Sweet Potato","Carrot","Onion","Garlic","Beetroot","Radish","Turnip","Rutabaga","Celeriac",
  "Cassava","Ginger","Turmeric","Daikon","Parsnip","Spinach","Kale","Cabbage","Lettuce","Swiss Chard",
  "Mustard Greens","Bok Choy","Collard Greens","Arugula","Romaine","Broccoli","Cauliflower","Brussels Sprouts",
  "Kohlrabi","Cabbage Red","Tomato","Bell Pepper","Chili Pepper","Cucumber","Zucchini","Eggplant","Okra",
  "Pumpkin","Butternut Squash","Acorn Squash","Parsley","Coriander","Cilantro","Mint","Rosemary","Thyme",
  "Basil","Lettuce Iceberg"
];
const COLORS = ["#3B6D11","#BA7517","#0F6E56","#534AB7","#993C1D"];
const METRICS = ["calories","protein","carbs","fat","fiber","vitaminC","potassium"];
const LABELS  = {calories:"Calories (kcal)",protein:"Protein (g)",carbs:"Carbs (g)",fat:"Fat (g)",fiber:"Fiber (g)",vitaminC:"Vitamin C (mg)",potassium:"Potassium (mg)"};

// ── State ─────────────────────────────────────────────────
let selectedItems = [];
let barChartInst = null, radarChartInst = null;


// ── Render pickers ────────────────────────────────────────
function renderPicker(containerId, items) {
  const el = document.getElementById(containerId);

  el.innerHTML = items.map(name => `
    <div class="pick-item" data-name="${name}" onclick="toggleItem(this.dataset.name)">
      ${name}
    </div>
  `).join("");
}

renderPicker("fruits-picker", FRUITS);
renderPicker("vegs-picker", VEGS);

// ── Toggle item selection ─────────────────────────────────
function toggleItem(name) {
  const index = selectedItems.indexOf(name);

  if (index > -1) {
    selectedItems.splice(index, 1);
  } else {
    if (selectedItems.length >= 5) return; // limit
    selectedItems.push(name);
  }

  updateUI();
}

// ── Update UI ─────────────────────────────────────────────
function updateUI() {
  // Highlight selected items
  document.querySelectorAll(".pick-item").forEach(el => {
    const name = el.dataset.name;

    if (selectedItems.includes(name)) {
      el.classList.add("selected");
    } else {
      el.classList.remove("selected");
    }
  });

  // Update selected bar
  const bar = document.getElementById("selected-bar");
  const btn = document.getElementById("compare-btn");

  if (selectedItems.length === 0) {
    bar.innerHTML = `
      <span style="font-size:13px;color:#9ca3af;">No items selected</span>
      <button class="compare-btn" id="compare-btn" disabled>Compare</button>
    `;
  } else {
    bar.innerHTML = `
      ${selectedItems.map(name => `
        <span class="sel-tag">
          ${name}
          <button onclick="removeItem('${name}')">×</button>
        </span>
      `).join("")}
      <button class="compare-btn" id="compare-btn" ${selectedItems.length < 2 ? "disabled" : ""} onclick="runCompare()">Compare</button>
    `;
  }
}

function removeItem(name) {
  selectedItems = selectedItems.filter(item => item !== name);
  updateUI();
}

// ── Run comparison ─────────────────────────────────────────
async function runCompare() {
  if (selectedItems.length < 2) return;

  document.getElementById("loading").classList.remove("hidden");
  document.getElementById("results-section").classList.add("hidden");

  try {
    const data = selectedItems.map(name => {

      // Debug missing items
      if (!NUTRITION_DB[name]) {
        console.warn("Missing nutrition data for:", name);
      }

      return {
        name,
        emoji: "",
        nutrition: NUTRITION_DB[name] || {
          calories:0,
          protein:0,
          carbs:0,
          fat:0,
          fiber:0,
          vitaminC:0,
          potassium:0
        }
      };
    });

    console.log(data);

    document.getElementById("loading").classList.add("hidden");
    renderCharts(data);
    document.getElementById("results-section").classList.remove("hidden");

  } catch (err) {
    console.error("COMPARE ERROR:", err);
    document.getElementById("loading").innerText = "❌ Error loading data";
  }
}
// ── Render charts ─────────────────────────────────────────
function renderCharts(data) {
  renderBar(data);
  renderRadar(data);
  renderTable(data);
}

function renderBar(data) {
  if (barChartInst) barChartInst.destroy();
  const ctx = document.getElementById("bar-chart").getContext("2d");
  barChartInst = new Chart(ctx, {
    type: "bar",
    data: {
      labels: METRICS.map(m => LABELS[m].split(" ")[0]),
      datasets: data.map((item, i) => ({
        label: item.emoji + " " + item.name,
        data: METRICS.map(m => item.nutrition[m] || 0),
        backgroundColor: COLORS[i] + "cc",
        borderColor: COLORS[i],
        borderWidth: 1.5,
        borderRadius: 4,
      })),
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { position:"top", labels:{ font:{size:12}, boxWidth:12 } } },
      scales: {
        x: { grid:{display:false}, ticks:{font:{size:11}} },
        y: { beginAtZero:true, grid:{color:"#f3f4f6"}, ticks:{font:{size:11}} },
      },
    },
  });
}

function renderRadar(data) {
  if (radarChartInst) radarChartInst.destroy();
  const ctx = document.getElementById("radar-chart").getContext("2d");

  // Normalise values 0–100 per metric
  const maxPerMetric = METRICS.map(m => Math.max(...data.map(d => d.nutrition[m] || 0)));
  radarChartInst = new Chart(ctx, {
    type: "radar",
    data: {
      labels: METRICS.map(m => LABELS[m].split(" ")[0]),
      datasets: data.map((item, i) => ({
        label: item.emoji + " " + item.name,
        data: METRICS.map((m, mi) => maxPerMetric[mi] ? ((item.nutrition[m] || 0) / maxPerMetric[mi]) * 100 : 0),
        backgroundColor: COLORS[i] + "33",
        borderColor: COLORS[i],
        borderWidth: 2,
        pointBackgroundColor: COLORS[i],
        pointRadius: 3,
      })),
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend:{ position:"top", labels:{font:{size:12}, boxWidth:12} } },
      scales: { r: { beginAtZero:true, max:100, grid:{color:"#f3f4f6"}, ticks:{display:false} } },
    },
  });
}

function renderTable(data) {
  const table = document.getElementById("comp-table");
  const maxVals = {};
  METRICS.forEach(m => { maxVals[m] = Math.max(...data.map(d => d.nutrition[m] || 0)); });

  const headers = `<tr><th>Nutrient (per 100g)</th>${data.map(d=>`<th>${d.emoji} ${d.name}</th>`).join("")}</tr>`;
  const rows = METRICS.map(m => {
    const cells = data.map(d => {
      const v = d.nutrition[m] ?? "–";
      const isBest = v === maxVals[m];
      return `<td>${isBest ? `<span class="best-val">${v}</span>` : v}</td>`;
    }).join("");
    return `<tr><td>${LABELS[m]}</td>${cells}</tr>`;
  }).join("");

  table.innerHTML = `<thead>${headers}</thead><tbody>${rows}</tbody>`;
}

// ── Chart tabs ────────────────────────────────────────────
document.querySelectorAll(".chart-tab").forEach(tab => {
  tab.addEventListener("click", () => {
    document.querySelectorAll(".chart-tab, .chart-panel").forEach(el => el.classList.remove("active"));
    tab.classList.add("active");
    document.getElementById(`panel-${tab.dataset.panel}`).classList.add("active");
  });
});
</script>
