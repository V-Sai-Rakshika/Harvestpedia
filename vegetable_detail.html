<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Vegetable – Harvestpedia</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <script src="js/darkmode.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --veg-50:#f4fbf0; --veg-100:#dff2d0; --veg-200:#b8e4a0;
      --veg-400:#6dbf3e; --veg-600:#3d8a1a; --veg-800:#214d0a;
      --cream:#fdfaf5; --warm-white:#fffef9;
      --text-dark:#1c2b1e; --text-mid:#3d5440; --text-muted:#6b8070;
      --shadow-sm:0 2px 12px rgba(30,60,35,0.07);
      --shadow-md:0 8px 32px rgba(30,60,35,0.11);
      --radius-sm:12px; --radius-md:20px;
    }
    html { scroll-behavior: smooth; }
    body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--text-dark); overflow-x: hidden; }
    nav { position:fixed;top:0;left:0;right:0;z-index:200;display:flex;align-items:center;justify-content:space-between;padding:16px 48px;background:rgba(253,250,245,0.88);backdrop-filter:blur(16px);border-bottom:1px solid rgba(109,191,62,0.12); }
    .nav-logo{display:flex;align-items:center;gap:10px;font-family:'Playfair Display',serif;font-size:22px;font-weight:700;color:var(--veg-800);text-decoration:none;}
    .nav-logo-leaf{width:34px;height:34px;background:linear-gradient(135deg,var(--veg-400),var(--veg-600));border-radius:50% 12px 50% 12px;display:flex;align-items:center;justify-content:center;font-size:16px;box-shadow:0 4px 14px rgba(61,138,26,0.3);}
    .nav-links{display:flex;align-items:center;gap:6px;list-style:none;}
    .nav-links a{text-decoration:none;color:var(--text-mid);font-size:14px;font-weight:500;padding:8px 18px;border-radius:50px;transition:all .2s;}
    .nav-links a:hover,.nav-links a.active{background:var(--veg-50);color:var(--veg-600);}
    .nav-cta{background:var(--veg-600)!important;color:white!important;box-shadow:0 4px 14px rgba(61,138,26,0.3);}
    .nav-cta:hover{background:var(--veg-800)!important;}
    .dm-toggle{background:none;border:1.5px solid var(--veg-200);border-radius:8px;padding:6px 12px;cursor:pointer;font-size:1rem;color:var(--text-mid);transition:border-color .2s;}
    .breadcrumb{padding:100px 48px 0;display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text-muted);}
    .breadcrumb a{color:var(--veg-600);text-decoration:none;}
    .breadcrumb a:hover{text-decoration:underline;}
    .breadcrumb span{opacity:.5;}
    .hero{display:grid;grid-template-columns:420px 1fr;gap:56px;padding:40px 48px 60px;align-items:start;max-width:1200px;margin:0 auto;}
    @media(max-width:820px){.hero{grid-template-columns:1fr;padding:24px 24px 40px;}}
    .hero-img-wrap{position:relative;border-radius:var(--radius-md);overflow:hidden;aspect-ratio:4/3;box-shadow:var(--shadow-md);background:var(--veg-50);}
    .hero-img-wrap img{width:100%;height:100%;object-fit:cover;display:block;}
    .family-badge{position:absolute;top:16px;left:16px;padding:6px 14px;border-radius:99px;font-size:12px;font-weight:600;background:rgba(61,138,26,0.88);color:white;}
    .hero-info{padding-top:8px;}
    .hero-family{font-size:12px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--veg-600);margin-bottom:10px;}
    .hero-name{font-family:'Playfair Display',serif;font-size:3rem;font-weight:700;color:var(--text-dark);line-height:1.1;margin-bottom:12px;}
    .hero-tagline{font-size:16px;color:var(--text-muted);line-height:1.6;margin-bottom:24px;min-height:28px;}
    .hero-meta{display:flex;gap:16px;margin-bottom:28px;flex-wrap:wrap;}
    .meta-chip{display:flex;flex-direction:column;align-items:center;padding:12px 20px;background:white;border:1px solid var(--veg-100);border-radius:var(--radius-sm);min-width:80px;box-shadow:var(--shadow-sm);}
    .meta-val{font-family:'Playfair Display',serif;font-size:1.4rem;font-weight:700;color:var(--veg-600);}
    .meta-lbl{font-size:11px;color:var(--text-muted);margin-top:2px;}
    .nutrients-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:28px;}
    .nutrient-tag{padding:5px 12px;background:var(--veg-50);border:1px solid var(--veg-100);border-radius:99px;font-size:12px;font-weight:500;color:var(--veg-600);}
    .hero-actions{display:flex;gap:12px;flex-wrap:wrap;}
    .btn{display:inline-flex;align-items:center;gap:8px;padding:12px 24px;border-radius:50px;font-size:14px;font-weight:600;text-decoration:none;border:none;cursor:pointer;transition:all .2s;}
    .btn-primary{background:var(--veg-600);color:white;box-shadow:0 4px 14px rgba(61,138,26,0.3);}
    .btn-primary:hover{background:var(--veg-800);}
    .btn-outline{background:transparent;border:2px solid var(--veg-200);color:var(--veg-600);}
    .btn-outline:hover{border-color:var(--veg-400);background:var(--veg-50);}
    .sections{max-width:1200px;margin:0 auto;padding:0 48px 80px;display:grid;grid-template-columns:1fr 1fr;gap:24px;}
    @media(max-width:820px){.sections{grid-template-columns:1fr;padding:0 24px 60px;}}
    .card{background:white;border:1px solid var(--veg-100);border-radius:var(--radius-md);padding:28px 32px;box-shadow:var(--shadow-sm);}
    .card.full{grid-column:1/-1;}
    .card-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted);margin-bottom:18px;}
    .nut-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
    .nut-item{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:var(--veg-50);border-radius:10px;}
    .nut-label{font-size:13px;color:var(--text-muted);}
    .nut-val{font-size:14px;font-weight:600;color:var(--veg-600);}
    .benefits-list{display:flex;flex-direction:column;gap:12px;}
    .benefit-item{display:flex;gap:12px;align-items:flex-start;font-size:14px;line-height:1.55;color:var(--text-mid);}
    .benefit-dot{width:8px;height:8px;min-width:8px;background:var(--veg-400);border-radius:50%;margin-top:5px;}
    .season-pills{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;}
    .s-pill{padding:6px 14px;border-radius:99px;font-size:12px;font-weight:600;}
    .s-peak{background:#d1fae5;color:#065f46;} .s-good{background:#fef3c7;color:#92400e;} .s-low{background:#f3f4f6;color:#6b7280;}
    .season-note{font-size:13px;color:var(--text-muted);line-height:1.5;}
    .tips-list{display:flex;flex-direction:column;gap:12px;}
    .tip-item{padding:14px 18px;background:var(--veg-50);border-radius:12px;border-left:3px solid var(--veg-400);font-size:14px;line-height:1.55;color:var(--text-mid);}
    .about-prose{font-size:15px;line-height:1.75;color:var(--text-mid);}
    .skeleton{background:linear-gradient(90deg,var(--veg-50) 25%,var(--veg-100) 50%,var(--veg-50) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:8px;}
    @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
    .skel-line{height:16px;margin-bottom:10px;display:block;}
    .skel-line.wide{width:90%;} .skel-line.mid{width:65%;} .skel-line.short{width:40%;}
    [data-theme="dark"] body{background:#111a11;color:#e8f4e8;}
    [data-theme="dark"] nav{background:rgba(17,26,17,0.92);}
    [data-theme="dark"] .card{background:#1e2d1e;border-color:#2d4a2d;}
    [data-theme="dark"] .nut-item,[data-theme="dark"] .tip-item{background:#1a2a1a;}
    [data-theme="dark"] .meta-chip{background:#1a2a1a;border-color:#2d4a2d;}
    @media(max-width:600px){nav{padding:14px 20px;}.breadcrumb{padding:80px 20px 0;}.hero{padding:20px;}.hero-name{font-size:2rem;}.sections{padding:0 20px 48px;}}
  </style>
</head>
<body>
<nav>
  <a class="nav-logo" href="index.html"><div class="nav-logo-leaf">🌿</div>Harvestpedia</a>
  <ul class="nav-links">

</nav>
<div class="breadcrumb"><a href="index.html">🏠 Home</a><span>›</span><a href="vegetables.html">Vegetables</a><span>›</span><span id="bc-name">—</span></div>
<div class="hero" id="hero-section">
  <div class="hero-img-wrap">
    <img id="hero-img" src="" alt=""/>
    <span class="family-badge" id="family-badge"></span>
  </div>
  <div class="hero-info">
    <div class="hero-family" id="hero-family"></div>
    <h1 class="hero-name" id="hero-name">—</h1>
    <p class="hero-tagline" id="hero-tagline"><span class="skeleton skel-line wide"></span><span class="skeleton skel-line mid"></span></p>
    <div class="hero-meta">
      <div class="meta-chip"><span class="meta-val" id="meta-cal">—</span><span class="meta-lbl">kcal / 100g</span></div>
      <div class="meta-chip"><span class="meta-val" id="meta-family">—</span><span class="meta-lbl">Family</span></div>
    </div>
    <div class="nutrients-row" id="nutrients-row"></div>
    <div class="hero-actions">
      <a id="btn-recipe" href="recipes.html" class="btn btn-primary">🍳 Find Recipes</a>
      <a id="btn-compare" href="compare.html" class="btn btn-outline">📊 Compare</a>
    </div>
  </div>
</div>
<div class="sections" id="sections">
  <div class="card"><div class="card-title">🧪 Nutrition (per 100g)</div><div class="nut-grid" id="nut-grid"><span class="skeleton skel-line" style="grid-column:1/-1"></span><span class="skeleton skel-line"></span><span class="skeleton skel-line"></span></div></div>
  <div class="card"><div class="card-title">💚 Health Benefits</div><div class="benefits-list" id="benefits-list"><span class="skeleton skel-line wide"></span><span class="skeleton skel-line mid"></span><span class="skeleton skel-line wide"></span></div></div>
  <div class="card"><div class="card-title">📅 Best Season (India)</div><div class="season-pills" id="season-pills"><span class="skeleton skel-line short"></span><span class="skeleton skel-line short"></span></div><p class="season-note" id="season-note"></p></div>
  <div class="card"><div class="card-title">💡 Cooking &amp; Storage Tips</div><div class="tips-list" id="tips-list"><span class="skeleton skel-line wide"></span><span class="skeleton skel-line mid"></span></div></div>
  <div class="card full"><div class="card-title">📖 About</div><p class="about-prose" id="about-prose"><span class="skeleton skel-line wide" style="display:block;margin-bottom:8px"></span><span class="skeleton skel-line wide" style="display:block;margin-bottom:8px"></span><span class="skeleton skel-line mid" style="display:block"></span></p></div>
</div>
<script src="js/api.js"></script>
<script>
const VEGS=[
  {name:'Potato',family:'Root',season:'year',cal:77,img:'https://images.unsplash.com/photo-1518977676601-b53f82aba655?w=600&q=80',nutrients:['Vit C','Potassium','Complex carbs']},
  {name:'Sweet Potato',family:'Root',season:'autumn',cal:86,img:'https://images.unsplash.com/photo-1730815048561-45df6f7f331d?w=600&q=80',nutrients:['Vit A','Vit C','Fiber']},
  {name:'Carrot',family:'Root',season:'autumn',cal:41,img:'https://images.unsplash.com/photo-1633380110125-f6e685676160?w=600&q=80',nutrients:['Vit A','Fiber','Antioxidants']},
  {name:'Onion',family:'Root',season:'year',cal:40,img:'https://plus.unsplash.com/premium_photo-1668076517573-fa01307d87ad?w=600&q=80',nutrients:['Vit C','Fiber','Quercetin']},
  {name:'Garlic',family:'Root',season:'autumn',cal:149,img:'https://images.unsplash.com/photo-1636210589096-a53d5dacd702?w=600&q=80',nutrients:['Vit C','Allicin','Manganese']},
  {name:'Beetroot',family:'Root',season:'autumn',cal:43,img:'https://images.unsplash.com/photo-1503623758111-863eb2abd7a9?w=600&q=80',nutrients:['Folate','Vit C','Nitrates']},
  {name:'Radish',family:'Root',season:'spring',cal:16,img:'https://images.unsplash.com/photo-1585369496178-144fd937f249?w=600&q=80',nutrients:['Vit C','Fiber','Antioxidants']},
  {name:'Turnip',family:'Root',season:'autumn',cal:28,img:'https://images.unsplash.com/photo-1555447740-03e40562af94?w=600&q=80',nutrients:['Vit C','Fiber','Glucosinolates']},
  {name:'Rutabaga',family:'Root',season:'autumn',cal:37,img:'https://www.allrecipes.com/thmb/KqcH-lDP_FG2mAyHiIc21zGlXow=/1500x0/filters:no_upscale():max_bytes(150000):strip_icc()/Rutabaga-3000-x-2000-017e4663eda4400d888e1203764778b1.png',nutrients:['Vit C','Fiber','Calcium']},
  {name:'Celeriac',family:'Root',season:'autumn',cal:42,img:'https://cdn-prod.medicalnewstoday.com/content/images/articles/320/320374/celeriac-chopped-on-a-fabric-surface.jpg',nutrients:['Vit K','Fiber','Phosphorus']},
  {name:'Cassava',family:'Root',season:'year',cal:160,img:'https://media.istockphoto.com/id/614051680/photo/fresh-tapioca-cassava-root-kerala-india.jpg?s=612x612&w=0&k=20&c=XUhUqjkrMZrd8F0tUSXR0fsyB9zxiEWBD3brMAhotKg=',nutrients:['Complex carbs','Manganese','Vit C']},
  {name:'Ginger',family:'Root',season:'year',cal:80,img:'https://plus.unsplash.com/premium_photo-1675364893053-180a3c6e0119?w=600&q=80',nutrients:['Gingerol','Vit B6','Magnesium']},
  {name:'Turmeric',family:'Root',season:'year',cal:312,img:'https://images.unsplash.com/photo-1606951444141-e5533feb55be?w=600&q=80',nutrients:['Curcumin','Antioxidants','Iron']},
  {name:'Daikon',family:'Root',season:'autumn',cal:18,img:'https://plus.unsplash.com/premium_photo-1723485627473-7227c17bf7ef?w=600&q=80',nutrients:['Vit C','Fiber','Nitrates']},
  {name:'Parsnip',family:'Root',season:'autumn',cal:75,img:'https://springforestfarm.com/wp-content/uploads/2021/03/parsnips.jpg?w=1024',nutrients:['Vit C','Fiber','Potassium']},
  {name:'Spinach',family:'Leafy',season:'year',cal:23,img:'https://images.unsplash.com/photo-1576045057995-568f588f82fb?w=600&q=80',nutrients:['Vit A','Vit K','Iron','Folate']},
  {name:'Kale',family:'Leafy',season:'autumn',cal:35,img:'https://images.unsplash.com/photo-1685504513848-df0dd6893cec?w=600&q=80',nutrients:['Vit A','Vit K','Calcium','Fiber']},
  {name:'Cabbage',family:'Leafy',season:'year',cal:25,img:'https://plus.unsplash.com/premium_photo-1702489575687-204529449d94?w=600&q=80',nutrients:['Vit C','Fiber','Vit K']},
  {name:'Lettuce',family:'Leafy',season:'year',cal:15,img:'https://green-goblin.in/cdn/shop/files/LettuceLeafy1webp.webp?v=1709991868',nutrients:['Vit A','Vit K','Fiber']},
  {name:'Tomato',family:'Fruit-veg',season:'summer',cal:18,img:'https://images.unsplash.com/photo-1592924357228-91a4daadcfea?w=600&q=80',nutrients:['Lycopene','Vit C','Vit K']},
  {name:'Bell Pepper',family:'Fruit-veg',season:'summer',cal:31,img:'https://images.unsplash.com/photo-1563565375-f3fdfdbefa83?w=600&q=80',nutrients:['Vit C','Vit B6','Folate']},
  {name:'Cucumber',family:'Fruit-veg',season:'summer',cal:16,img:'https://images.unsplash.com/photo-1568584711075-3d021a7c3ca3?w=600&q=80',nutrients:['Hydration','Vit K','Magnesium']},
  {name:'Broccoli',family:'Cruciferous',season:'winter',cal:34,img:'https://images.unsplash.com/photo-1459411621453-7b03977f4bfc?w=600&q=80',nutrients:['Vit C','Vit K','Folate']},
  {name:'Cauliflower',family:'Cruciferous',season:'winter',cal:25,img:'https://images.unsplash.com/photo-1510627498534-cf7e9002facc?w=600&q=80',nutrients:['Vit C','Fiber','Choline']},
];
const SEASON_LABELS={summer:'☀️ Summer',spring:'🌸 Spring',autumn:'🍂 Autumn',winter:'❄️ Winter',year:'🌍 Year-round'};

async function loadDetail(){
  const name=new URLSearchParams(window.location.search).get('veg')||'Carrot';
  const v=VEGS.find(x=>x.name.toLowerCase()===name.toLowerCase())||{name,family:'',season:'year',cal:'—',img:'',nutrients:[]};
  document.title=v.name+' – Harvestpedia';
  document.getElementById('bc-name').textContent=v.name;
  document.getElementById('hero-name').textContent=v.name;
  document.getElementById('hero-family').textContent=v.family;
  document.getElementById('meta-cal').textContent=v.cal;
  document.getElementById('meta-family').textContent=v.family||'Vegetable';
  if(v.img){document.getElementById('hero-img').src=v.img;document.getElementById('hero-img').alt=v.name;}
  document.getElementById('family-badge').textContent=v.family||'';
  document.getElementById('nutrients-row').innerHTML=(v.nutrients||[]).map(n=>`<span class="nutrient-tag">${n}</span>`).join('');
  localStorage.setItem('hp-recipe-prefill',v.name);
  document.getElementById('btn-compare').href='compare.html?item='+encodeURIComponent(v.name);
  try{
    const raw=await HP.claude(
      `Give detailed info about the vegetable: ${v.name}. Respond ONLY with JSON (no markdown):\n{"tagline":"...","about":"2-3 sentences...","nutrition":{"Calories":"XX kcal","Carbs":"XXg","Fiber":"XXg","Protein":"XXg","Fat":"XXg","Vitamin C":"XX% DV","Iron":"XX% DV","Potassium":"XXXmg"},"benefits":["...","...","...","..."],"seasons":{"peak":["Month"],"good":["Month"],"low":["Month"]},"season_note":"one sentence about India","tips":["...","...","..."]}`,
      'You are a nutrition expert. Return valid JSON only, no markdown.'
    );
    const d=JSON.parse(raw.replace(/```json|```/g,'').trim());
    document.getElementById('hero-tagline').innerHTML=d.tagline||'';
    const ng=document.getElementById('nut-grid');ng.innerHTML='';
    for(const[l,v2]of Object.entries(d.nutrition||{}))ng.innerHTML+=`<div class="nut-item"><span class="nut-label">${l}</span><span class="nut-val">${v2}</span></div>`;
    document.getElementById('benefits-list').innerHTML=(d.benefits||[]).map(b=>`<div class="benefit-item"><div class="benefit-dot"></div><span>${b}</span></div>`).join('');
    const sp=document.getElementById('season-pills');sp.innerHTML='';
    (d.seasons?.peak||[]).forEach(m=>sp.innerHTML+=`<span class="s-pill s-peak">🌟 ${m}</span>`);
    (d.seasons?.good||[]).forEach(m=>sp.innerHTML+=`<span class="s-pill s-good">✅ ${m}</span>`);
    (d.seasons?.low||[]).forEach(m=>sp.innerHTML+=`<span class="s-pill s-low">〰️ ${m}</span>`);
    document.getElementById('season-note').textContent=d.season_note||'';
    document.getElementById('tips-list').innerHTML=(d.tips||[]).map(t=>`<div class="tip-item">${t}</div>`).join('');
    document.getElementById('about-prose').textContent=d.about||'';
  }catch(err){
    console.error(err);
    document.getElementById('hero-tagline').innerHTML='';
    ['nut-grid','benefits-list','tips-list'].forEach(id=>document.getElementById(id).innerHTML='<p style="color:var(--text-muted);font-size:13px">Start the proxy to see details: <code>node server/proxy.js</code></p>');
  }
}
loadDetail();
</script>
</body>
</html>
