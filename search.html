<link rel="stylesheet" href="../css/style.css" />
<style>
  /* ── Search page styles ── */
  .search-hero {
  padding: 100px 24px 50px;
  text-align: center;
  background: var(--warm-white);
}

.search-hero h1 {
  font-family: 'Playfair Display', serif;
  font-size: 42px;
  font-weight: 700;
  color: var(--text-dark);
}

.search-hero p {
  color: var(--text-muted);
  margin-top: 8px;
  font-size: 15px;
}
  .search-bar-wrap {
  max-width: 600px;
  margin: 0 auto;

  display: flex;
  border-radius: 50px;
  overflow: hidden;

  background: white;
  border: 1px solid var(--green-100);
  box-shadow: var(--shadow-md);
}

#global-input {
  flex: 1;
  padding: 14px 20px;
  border: none;
  outline: none;

  font-size: 14px;
  color: var(--text-dark);
}

#search-btn {
  padding: 14px 24px;
  background: var(--green-600);
  color: white;

  border: none;
  font-weight: 600;
}

#search-btn:hover {
  background: var(--green-800);
}
  #global-input {
    flex: 1; padding: 14px 20px; font-size: 1rem;
    border: none; outline: none;
    background: #fff; color: var(--text-primary, #1a3a1a);
  }
  #search-btn {
    padding: 14px 24px; background: #3B6D11; color: #fff;
    border: none; cursor: pointer; font-size: 1rem; font-weight: 600;
    transition: background .2s;
  }
  #search-btn:hover { background: #2d5209; }

  /* Filter pills */
  .pill {
  padding: 6px 16px;
  border-radius: 50px;

  border: 1px solid var(--green-100);
  background: var(--green-50);

  font-size: 12px;
  color: var(--text-mid);
  font-weight: 500;

  transition: all 0.2s ease;
}

.pill.all {
  background: var(--green-600);
  color: white;
  border-color: var(--green-600);
}

.pill:not(.inactive):not(.all) {
  background: var(--green-100);
  color: var(--green-800);
}

  .pill.all    { background:#3B6D11; color:#fff; border-color:#3B6D11; }
  .pill.fruits { background:#fff3e0; color:#854F0B; border-color:#FAC775; }
  .pill.vegs   { background:#e1f5ee; color:#0F6E56; border-color:#9FE1CB; }
  .pill.plants { background:#eeedfe; color:#534AB7; border-color:#CECBF6; }
  .pill.inactive { background:#fff; color:#6b7280; border-color:#e0e0e0; }

  /* Results area */
  .results-wrap { max-width: 900px; margin: 0 auto; padding: 2rem 1.5rem; }

  .result-group { margin-bottom: 2rem; }
  .result-group-title {
    font-size: 13px; font-weight: 600; letter-spacing: .06em; text-transform: uppercase;
    color: var(--text-muted, #6b7280); margin-bottom: 0.75rem;
    padding-bottom: 0.5rem; border-bottom: 1.5px solid #e5e7eb;
    display: flex; align-items: center; gap: 8px;
  }
  .count-badge {
    background: #f3f4f6; color: #374151;
    border-radius: 99px; font-size: 11px; padding: 1px 8px;
  }

  .result-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 12px;
  }
  .result-card {
  background: white;
  border-radius: var(--radius-lg);

  padding: 16px;

  border: 1px solid var(--green-100);
  box-shadow: var(--shadow-md);

  text-decoration: none;
  color: var(--text-dark);

  transition: all 0.25s ease;
}

.result-card:hover {
  transform: translateY(-3px);
  box-shadow: 0 10px 30px rgba(30,60,35,0.15);
}
.result-group-title {
  font-size: 12px;
  font-weight: 700;
  letter-spacing: .08em;

  color: var(--text-muted);

  border-bottom: 1px solid var(--green-100);
  padding-bottom: 6px;
}
  .result-info strong { display: block; font-weight: 600; font-size: 14px; color: #1a3a1a; }
  .result-info span   { font-size: 12px; color: #6b7280; }

  /* Module color accents */
  .result-card.fruit  { border-left: 3px solid #BA7517; }
  .result-card.veg    { border-left: 3px solid #0F6E56; }
  .result-card.plant  { border-left: 3px solid #534AB7; }

  /* States */
  .search-empty, .search-loading, .search-start {
    text-align: center; padding: 3rem; color: #9ca3af;
  }
  .search-start,
.search-empty {
  color: var(--text-muted);
  font-size: 14px;
}
  .search-empty   { font-size: 1rem; }
  .search-loading { font-size: 1.1rem; }
  .search-start .big { font-size: 3rem; margin-bottom: 0.5rem; }
  .highlight { background: #fef08a; border-radius: 3px; padding: 0 2px; }

</style>
<script src="/Harvestpedia/js/api.js"></script>
<script src="Harvestpedia/js/darkmode.js"></script>

</main>

ALL_DATA.forEach(item => {
  if (item.type === "fruit") item.module = "fruit";
  if (item.type === "vegetable") item.module = "veg";
});
// ── State ──────────────────────────────────────────────────
let activeFilter = "all";

// ── Elements ───────────────────────────────────────────────
const input      = document.getElementById("global-input");
const btn        = document.getElementById("search-btn");
const state      = document.getElementById("search-state");
const resultsArea= document.getElementById("results-area");

// ── Search logic ───────────────────────────────────────────
function search(query) {
  query = query.trim().toLowerCase();
  if (!query) { showStart(); return; }

  let data = ALL_DATA;
  if (activeFilter !== "all") {
    const map = { fruits:"fruit", vegs:"veg", plants:"plant" };
    data = data.filter(d => d.module === map[activeFilter]);
  }

  const results = data.filter(item => {
    const haystack = [item.name, ...item.tags].join(" ").toLowerCase();
    return haystack.includes(query);
  });

  renderResults(results, query);
}

function renderResults(results, query) {
  state.style.display    = "none";
  resultsArea.style.display = "block";

  if (results.length === 0) {
    resultsArea.innerHTML = `<div class="search-empty">😕 No results for "<strong>${query}</strong>". Try a different term.</div>`;
    return;
  }

  // Group by module
  const groups = { fruit: [], veg: [], plant: [] };
  results.forEach(r => groups[r.module].push(r));

  const labels = { fruit: "🍎 Fruits", veg: "🥦 Vegetables", plant: "🪴 Plants" };
  let html = "";

  for (const [mod, items] of Object.entries(groups)) {
    if (!items.length) continue;
    html += `
      <div class="result-group">
        <div class="result-group-title">
          ${labels[mod]}
          <span class="count-badge">${items.length}</span>
        </div>
        <div class="result-grid">
          ${items.map(item => `
            <a class="result-card ${mod}" href="${item.detailUrl}">
              <div class="result-info">
              <div class="result-info">
                <strong>${highlight(item.name, query)}</strong>
                <span>${item.tags.slice(0,2).join(" · ")}</span>
              </div>
            </a>
          `).join("")}
        </div>
      </div>
    `;
  }

  resultsArea.innerHTML = html;
}

function highlight(text, query) {
  const re = new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")})`, "gi");
  return text.replace(re, `<mark class="highlight">$1</mark>`);
}

function showStart() {
  state.style.display    = "block";
  resultsArea.style.display = "none";
}

// ── Filter pills ───────────────────────────────────────────
document.querySelectorAll(".pill").forEach(pill => {
  pill.addEventListener("click", () => {
    document.querySelectorAll(".pill").forEach(p => p.classList.add("inactive"));
    pill.classList.remove("inactive");
    activeFilter = pill.dataset.filter;
    search(input.value);
  });
});

// ── Event listeners ────────────────────────────────────────
btn.addEventListener("click", () => search(input.value));
input.addEventListener("keydown", e => e.key === "Enter" && search(input.value));
input.addEventListener("input", () => {
  if (input.value.length >= 2) search(input.value);
  else showStart();
});

// Pre-fill query from URL param (e.g. ?q=mango)
const urlQ = new URLSearchParams(location.search).get("q");
if (urlQ) { input.value = urlQ; search(urlQ); }
</script>
